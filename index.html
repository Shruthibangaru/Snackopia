<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snackopia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="C:\Users\KIIT\Desktop\main minor\styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        #videoElement {
            width: 640px;
            height: 480px;
            border: 1px solid #000;
            background-color: black; 
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm p-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <i class="fas fa-store fa-lg me-2"></i> 
                <span class="fw-bold">Snackopia</span>
            </a>
            <div class="ms-auto">
                <a href="#" class="nav-link d-inline-block me-3 fw-semibold">Price</a>
                <a href="#" class="nav-link d-inline-block fw-semibold">About</a>
            </div>
        </div>
    </nav>

    <div class="container text-center mt-4">
        <h1>Scan Your Item Here</h1>
        <div id="camera-container" class="mx-auto">
            <img id="videoElement" src="{{ url_for('video_feed') }}" />
            <button class="btn btn-primary mt-3" onclick="scanItem()">Scan Item</button>
        </div>
        <div id="item-info" class="mt-4">
            <p id="itemName">Item: </p>
            <p id="itemPrice">Price: </p>
            <p id="totalAmount">Total: ₹0.00</p>
        </div>
        <button class="btn btn-success mt-3" onclick="checkout()">Checkout</button>
    </div>

    <div class="container">
        <footer class="d-flex flex-wrap justify-content-between align-items-center py-3 my-4 border-top">
          <div class="col-md-4 d-flex align-items-center">
            <a href="/" class="mb-3 me-2 mb-md-0 text-body-secondary text-decoration-none lh-1">
              <svg class="bi" width="30" height="24"><use xlink:href="#bootstrap"></use></svg>
            </a>
            <span class="mb-3 mb-md-0 text-body-secondary">© 2024 Snackopia, Inc</span>
          </div>
          <ul class="nav col-md-4 justify-content-end list-unstyled d-flex">
            <li class="ms-3"><a class="text-body-secondary" href="#"><svg class="bi" width="24" height="24"><use xlink:href="#twitter"></use></svg></a></li>
            <li class="ms-3"><a class="text-body-secondary" href="#"><svg class="bi" width="24" height="24"><use xlink:href="#instagram"></use></svg></a></li>
            <li class="ms-3"><a class="text-body-secondary" href="#"><svg class="bi" width="24" height="24"><use xlink:href="#facebook"></use></svg></a></li>
          </ul>
        </footer>
    </div>

    <script>
        const videoElement = document.getElementById('videoElement');
        videoElement.src = "{{ url_for('video_feed') }}";

        function scanItem() {
            console.log("Scan Item button clicked!");
        }

        function checkout() {
            console.log("Checkout button clicked!");
        }
    </script>
    <!-- Change path to your local JavaScript file -->
    <script src="file:///C:/Users/KIIT/Desktop/main%20minor/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
